services:
  orbelias-node0:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=orbelias-node0:7301,orbelias-node1:7301,orbelias-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ORBELIAS_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7311:7301"
    volumes:
      - orbelias_training_node0:/data

  orbelias-node1:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=1
      - --peers=orbelias-node0:7301,orbelias-node1:7301,orbelias-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ORBELIAS_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_TRAIN_SECRET_KEY:-change-me-too}
    volumes:
      - orbelias_training_node1:/data

  orbelias-node2:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=2
      - --peers=orbelias-node0:7301,orbelias-node1:7301,orbelias-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ORBELIAS_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_TRAIN_SECRET_KEY:-change-me-too}
    volumes:
      - orbelias_training_node2:/data

volumes:
  orbelias_training_node0:
  orbelias_training_node1:
  orbelias_training_node2:
