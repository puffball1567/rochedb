services:
  kouten-node0:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=kouten-node0:7301,kouten-node1:7301,kouten-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${KOUTEN_TRAIN_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7311:7301"
    volumes:
      - kouten_training_node0:/data

  kouten-node1:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=1
      - --peers=kouten-node0:7301,kouten-node1:7301,kouten-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${KOUTEN_TRAIN_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_TRAIN_SECRET_KEY:-change-me-too}
    volumes:
      - kouten_training_node1:/data

  kouten-node2:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=2
      - --peers=kouten-node0:7301,kouten-node1:7301,kouten-node2:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${KOUTEN_TRAIN_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_TRAIN_SECRET_KEY:-change-me-too}
    volumes:
      - kouten_training_node2:/data

volumes:
  kouten_training_node0:
  kouten_training_node1:
  kouten_training_node2:
