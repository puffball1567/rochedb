services:
  orbelias-training-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ORBELIAS_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7321:7301"
    volumes:
      - orbelias_training_local:/data

  orbelias-training-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ORBELIAS_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7331:7301"
    volumes:
      - orbelias_training_remote:/data

  orbelias-prompt-cache-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${ORBELIAS_CACHE_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7341:7301"
    volumes:
      - orbelias_prompt_cache_local:/data

  orbelias-prompt-cache-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${ORBELIAS_CACHE_PASSWORD:-change-me}
      - --secret-key=${ORBELIAS_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7351:7301"
    volumes:
      - orbelias_prompt_cache_remote:/data

volumes:
  orbelias_training_local:
  orbelias_training_remote:
  orbelias_prompt_cache_local:
  orbelias_prompt_cache_remote:
