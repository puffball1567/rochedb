services:
  kouten-training-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${KOUTEN_TRAIN_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7321:7301"
    volumes:
      - kouten_training_local:/data

  kouten-training-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${KOUTEN_TRAIN_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7331:7301"
    volumes:
      - kouten_training_remote:/data

  kouten-prompt-cache-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${KOUTEN_CACHE_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7341:7301"
    volumes:
      - kouten_prompt_cache_local:/data

  kouten-prompt-cache-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${KOUTEN_CACHE_PASSWORD:-change-me}
      - --secret-key=${KOUTEN_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7351:7301"
    volumes:
      - kouten_prompt_cache_remote:/data

volumes:
  kouten_training_local:
  kouten_training_remote:
  kouten_prompt_cache_local:
  kouten_prompt_cache_remote:
