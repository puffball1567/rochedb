services:
  roche-training-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ROCHE_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ROCHE_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7321:7301"
    volumes:
      - roche_training_local:/data

  roche-training-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/training-data
      - --galaxy=training-data
      - --user=train
      - --password=${ROCHE_TRAIN_PASSWORD:-change-me}
      - --secret-key=${ROCHE_TRAIN_SECRET_KEY:-change-me-too}
    ports:
      - "7331:7301"
    volumes:
      - roche_training_remote:/data

  roche-prompt-cache-local:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${ROCHE_CACHE_PASSWORD:-change-me}
      - --secret-key=${ROCHE_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7341:7301"
    volumes:
      - roche_prompt_cache_local:/data

  roche-prompt-cache-remote:
    build:
      context: ../..
      dockerfile: examples/compose/Dockerfile
    command:
      - --id=0
      - --peers=0.0.0.0:7301
      - --data=/data/prompt-cache
      - --galaxy=prompt-cache
      - --user=cache
      - --password=${ROCHE_CACHE_PASSWORD:-change-me}
      - --secret-key=${ROCHE_CACHE_SECRET_KEY:-change-me-too}
    ports:
      - "7351:7301"
    volumes:
      - roche_prompt_cache_remote:/data

volumes:
  roche_training_local:
  roche_training_remote:
  roche_prompt_cache_local:
  roche_prompt_cache_remote:
